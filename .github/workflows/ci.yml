name: CI

on: [push, pull_request]
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: current
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - run: pnpm build
